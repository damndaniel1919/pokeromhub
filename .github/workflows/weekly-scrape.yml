name: Weekly Game Scraper

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  scrape-and-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/scraper.py

      - name: Parse change summary
        id: summary
        run: |
          python3 - <<'PYEOF'
          import json, os
          with open("data/changes.json") as f:
              c = json.load(f)
          new_games = c.get("new_games", [])
          status_changes = c.get("status_changes", [])
          total = c.get("total_after", 0)
          new_list = "\n".join(f"- {g}" for g in new_games) or "_None_"
          status_list = "\n".join(f"- {s['title']}: {s['from']} -> {s['to']}" for s in status_changes) or "_None_"
          pr_body = f"""## Weekly Game Scraper Update\n\n| | |\n|---|---|\n| New games | {len(new_games)} |\n| Status changes | {len(status_changes)} |\n| Total in database | {total} |\n\n---\n\n### New Games\n{new_list}\n\n### Status Changes\n{status_list}\n\n---\n\n**To publish:** click Merge pull request. **To discard:** click Close pull request.\n"""
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"new_count={len(new_games)}\n")
              out.write(f"status_count={len(status_changes)}\n")
              out.write(f"total={total}\n")
              out.write(f"has_changes={'true' if new_games or status_changes else 'false'}\n")
          with open("/tmp/pr_body.md", "w") as f:
              f.write(pr_body)
          print(f"New: {len(new_games)}, Status changes: {len(status_changes)}, Total: {total}")
          PYEOF

      - name: No changes this week
        if: steps.summary.outputs.has_changes == 'false'
        run: echo "No new games or status changes detected. No PR needed."

      - name: Create branch and commit changes log
        if: steps.summary.outputs.has_changes == 'true'
        run: |
          BRANCH="scraper/weekly-update-$(date +%Y-%m-%d)"
          git config user.name "PokeROMHub Bot"
          git config user.email "bot@pokeromhub.com"
          git checkout -b $BRANCH
          git add data/changes.json
          git commit -m "Weekly scrape: +${{ steps.summary.outputs.new_count }} games, ${{ steps.summary.outputs.status_count }} status changes"
          git push origin $BRANCH --force
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Close any existing PR for this branch
        if: steps.summary.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh pr close $EXISTING --comment "Superseded by new run"
          fi

      - name: Create Pull Request
        if: steps.summary.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Weekly update: +${{ steps.summary.outputs.new_count }} new games, ${{ steps.summary.outputs.status_count }} status changes (${{ steps.summary.outputs.total }} total)" \
            --body-file /tmp/pr_body.md
